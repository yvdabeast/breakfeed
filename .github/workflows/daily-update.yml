name: Daily Breakfeed

on:
  schedule:
    # UTC 22:00 = Beijing 06:00 (next day)
    - cron: '0 22 * * *'
  workflow_dispatch: # Manual trigger
  push:
    branches: [main]
    paths: ['dist/**']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Save committed feed (has summaries)
        run: cp dist/data/feed.json /tmp/old-feed.json

      - name: Fetch fresh data
        run: python scripts/fetch_data.py

      - name: Merge summaries from committed feed
        run: |
          python3 -c "
          import json, sys

          # Load the committed feed (has summaries from repo)
          with open('/tmp/old-feed.json', 'r') as f:
              old_feed = json.load(f)

          # Load freshly fetched feed
          with open('dist/data/feed.json', 'r') as f:
              new_feed = json.load(f)

          # Build lookup from old feed
          old_summaries = {}
          old_bios = {}
          for b in old_feed.get('twitter', []):
              handle = b.get('handle', '')
              if b.get('bio_zh'):
                  old_bios[handle] = b['bio_zh']
              for t in b.get('tweets', []):
                  if t.get('summary_zh'):
                      old_summaries[t['id']] = t['summary_zh']

          # Merge into new feed
          merged_s = 0
          merged_b = 0
          for b in new_feed.get('twitter', []):
              handle = b.get('handle', '')
              if handle in old_bios and not b.get('bio_zh'):
                  b['bio_zh'] = old_bios[handle]
                  merged_b += 1
              for t in b.get('tweets', []):
                  tid = t.get('id', '')
                  if tid in old_summaries and not t.get('summary_zh'):
                      t['summary_zh'] = old_summaries[tid]
                      merged_s += 1

          with open('dist/data/feed.json', 'w') as f:
              json.dump(new_feed, f, ensure_ascii=False, indent=2)

          print(f'Merged {merged_s} summaries, {merged_b} bios', file=sys.stderr)
          "

      - name: Generate summaries (if API key available)
        if: env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install anthropic
          python scripts/summarize.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
