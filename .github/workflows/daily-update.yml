name: Daily Breakfeed

on:
  schedule:
    # UTC 22:00 = Beijing 06:00 (next day)
    - cron: '0 22 * * *'
  workflow_dispatch: # Manual trigger
  push:
    branches: [main]
    paths: ['dist/**']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch fresh data
        run: python scripts/fetch_data.py

      - name: Preserve Chinese summaries
        run: |
          python3 -c "
          import json, urllib.request, sys

          # Fetch the currently deployed feed (has summaries)
          try:
              req = urllib.request.Request('https://yvdabeast.github.io/breakfeed/data/feed.json')
              with urllib.request.urlopen(req, timeout=10) as resp:
                  old_feed = json.loads(resp.read())
          except Exception as e:
              print(f'No existing feed to merge: {e}', file=sys.stderr)
              sys.exit(0)

          # Load freshly fetched feed
          with open('dist/data/feed.json', 'r') as f:
              new_feed = json.load(f)

          # Build lookup: tweet_id -> summary_zh from old feed
          old_summaries = {}
          old_bios = {}
          for b in old_feed.get('twitter', []):
              handle = b.get('handle', '')
              if b.get('bio_zh'):
                  old_bios[handle] = b['bio_zh']
              for t in b.get('tweets', []):
                  if t.get('summary_zh'):
                      old_summaries[t['id']] = t['summary_zh']

          # Merge into new feed
          merged_summaries = 0
          merged_bios = 0
          for b in new_feed.get('twitter', []):
              handle = b.get('handle', '')
              if handle in old_bios and not b.get('bio_zh'):
                  b['bio_zh'] = old_bios[handle]
                  merged_bios += 1
              for t in b.get('tweets', []):
                  tid = t.get('id', '')
                  if tid in old_summaries and not t.get('summary_zh'):
                      t['summary_zh'] = old_summaries[tid]
                      merged_summaries += 1

          with open('dist/data/feed.json', 'w') as f:
              json.dump(new_feed, f, ensure_ascii=False, indent=2)

          print(f'Merged {merged_summaries} summaries, {merged_bios} bios', file=sys.stderr)
          "

      - name: Generate summaries (if API key available)
        if: env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install anthropic
          python scripts/summarize.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
