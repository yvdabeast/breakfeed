name: Breakfeed Update

on:
  schedule:
    # 4x daily in Beijing time (UTC+8):
    # UTC 22:00 = Beijing 06:00, UTC 04:00 = Beijing 12:00
    # UTC 10:00 = Beijing 18:00, UTC 16:00 = Beijing 00:00
    - cron: '0 22,4,10,16 * * *'
  workflow_dispatch: # Manual trigger
  push:
    branches: [main]
    paths: ['dist/**']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Save committed feed (has summaries)
        run: cp dist/data/feed.json /tmp/old-feed.json

      - name: Fetch fresh data
        run: python scripts/fetch_data.py

      - name: Merge summaries from committed feed
        run: |
          python3 -c "
          import json, sys

          # Load the committed feed (has summaries from repo)
          with open('/tmp/old-feed.json', 'r') as f:
              old_feed = json.load(f)

          # Load freshly fetched feed
          with open('dist/data/feed.json', 'r') as f:
              new_feed = json.load(f)

          # Build lookups from old feed (including history)
          old_tweet_summaries = {}
          old_bios = {}
          # Collect from current twitter
          for b in old_feed.get('twitter', []):
              handle = b.get('handle', '')
              if b.get('bio_zh'):
                  old_bios[handle] = b['bio_zh']
              for t in b.get('tweets', []):
                  if t.get('summary_zh'):
                      old_tweet_summaries[t['id']] = t['summary_zh']
          # Collect from twitter_history
          for day in old_feed.get('twitter_history', []):
              for b in day.get('builders', []):
                  handle = b.get('handle', '')
                  if b.get('bio_zh'):
                      old_bios[handle] = b['bio_zh']
                  for t in b.get('tweets', []):
                      if t.get('summary_zh'):
                          old_tweet_summaries[t['id']] = t['summary_zh']

          old_podcast_summaries = {}
          old_podcast_durations = {}
          for p in old_feed.get('podcasts', []):
              vid = p.get('videoId', '')
              if p.get('summary_zh'):
                  old_podcast_summaries[vid] = p['summary_zh']
              if p.get('duration'):
                  old_podcast_durations[vid] = {
                      'duration': p['duration'],
                      'durationSeconds': p.get('durationSeconds', 0)
                  }

          old_ph_summaries = {}
          for p in old_feed.get('producthunt', []):
              if p.get('summary_zh'):
                  old_ph_summaries[p.get('name', '')] = p['summary_zh']

          old_gh_summaries = {}
          for r in old_feed.get('github_trending', []):
              if r.get('summary_zh'):
                  old_gh_summaries[r.get('repo', '')] = r['summary_zh']

          # Merge into new feed
          merged = 0
          # Merge current twitter
          for b in new_feed.get('twitter', []):
              handle = b.get('handle', '')
              if handle in old_bios and not b.get('bio_zh'):
                  b['bio_zh'] = old_bios[handle]
              for t in b.get('tweets', []):
                  tid = t.get('id', '')
                  if tid in old_tweet_summaries and not t.get('summary_zh'):
                      t['summary_zh'] = old_tweet_summaries[tid]
                      merged += 1
          # Merge twitter_history
          for day in new_feed.get('twitter_history', []):
              for b in day.get('builders', []):
                  handle = b.get('handle', '')
                  if handle in old_bios and not b.get('bio_zh'):
                      b['bio_zh'] = old_bios[handle]
                  for t in b.get('tweets', []):
                      tid = t.get('id', '')
                      if tid in old_tweet_summaries and not t.get('summary_zh'):
                          t['summary_zh'] = old_tweet_summaries[tid]
                          merged += 1

          for p in new_feed.get('podcasts', []):
              vid = p.get('videoId', '')
              if vid in old_podcast_summaries and not p.get('summary_zh'):
                  p['summary_zh'] = old_podcast_summaries[vid]
                  merged += 1
              if vid in old_podcast_durations and not p.get('duration'):
                  p['duration'] = old_podcast_durations[vid]['duration']
                  p['durationSeconds'] = old_podcast_durations[vid]['durationSeconds']
                  merged += 1

          for p in new_feed.get('producthunt', []):
              name = p.get('name', '')
              if name in old_ph_summaries and not p.get('summary_zh'):
                  p['summary_zh'] = old_ph_summaries[name]
                  merged += 1

          for r in new_feed.get('github_trending', []):
              repo = r.get('repo', '')
              if repo in old_gh_summaries and not r.get('summary_zh'):
                  r['summary_zh'] = old_gh_summaries[repo]
                  merged += 1

          with open('dist/data/feed.json', 'w') as f:
              json.dump(new_feed, f, ensure_ascii=False, indent=2)

          print(f'Merged {merged} total summaries', file=sys.stderr)
          "

      - name: Generate summaries (if API key available)
        if: env.OPENAI_API_KEY != '' || env.ANTHROPIC_API_KEY != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install openai anthropic
          python scripts/summarize.py

      - name: Commit updated feed back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/data/feed.json
          git diff --cached --quiet || git commit -m "chore: update feed data [skip ci]"
          git push || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
